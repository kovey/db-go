name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # Lint & static analysis
  # ──────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet (root)
        run: go vet ./...

      - name: go vet (korm)
        run: cd korm && go vet ./...

  # ──────────────────────────────────────────────────────────
  # Fast unit tests — root module + korm (no external services)
  # ──────────────────────────────────────────────────────────
  test-unit:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Test root module
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Test korm
        run: cd korm && go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: |
            coverage.out
            korm/coverage.out
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # KSQL integration tests — needs real MySQL via service container
  # ──────────────────────────────────────────────────────────
  test-ksql:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ksql/go.sum

      - name: Create additional databases
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS test_prod;"

      - name: Test ksql
        run: cd ksql && go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          KSQL_DRIVER: mysql
          KSQL_TODB: test_dev
          KSQL_TO: "root:root@tcp(127.0.0.1:3306)/test_dev?charset=utf8mb4&parseTime=true"
          KSQL_FROMDB: test_prod
          KSQL_FROM: "root:root@tcp(127.0.0.1:3306)/test_prod?charset=utf8mb4&parseTime=true"

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ksql
          path: ksql/coverage.out
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Root module integration tests — real MySQL via service container
  # ──────────────────────────────────────────────────────────
  test-integration:
    needs: test-unit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run integration tests
        run: go test -v -race -tags=integration ./integration/
        env:
          MYSQL_DSN: "root:test@tcp(127.0.0.1:3306)/testdb?charset=utf8mb4&parseTime=true"

  # ──────────────────────────────────────────────────────────
  # Coverage summary
  # ──────────────────────────────────────────────────────────
  coverage:
    needs: [test-unit, test-ksql]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage-artifacts

      - name: Show coverage summary
        run: |
          echo "## Coverage Reports" >> $GITHUB_STEP_SUMMARY
          for f in coverage-artifacts/*.out; do
            if [ -f "$f" ]; then
              echo "### $(basename $f)" >> $GITHUB_STEP_SUMMARY
              go tool cover -func="$f" 2>/dev/null | tail -1 >> $GITHUB_STEP_SUMMARY || true
            fi
          done
